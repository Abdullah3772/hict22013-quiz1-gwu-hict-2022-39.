<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colourful Box Layout</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            padding:40px;
        }

        .container{
            width:800px;
            background:white;
            border:1px solid #ccc;
            padding:30px;
        }

        header{
            background:#2f5fd3;
            color:white;
            text-align:center;
            padding:20px;
            font-size:28px;
            font-weight:bold;
            border-radius:6px;
            margin-bottom:20px;
        }

        .boxes{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        .box{
            flex:1;
            height:180px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:24px;
            font-weight:bold;
            border-radius:6px;
        }

        .box1{
            background:#e51f1f;
            color:white;
        }

        .box2{
            background:#18a545;
            color:white;
        }

        .box3{
            background:#ffcc19;
            color:#333;
        }

        footer{
            background:#737a86;
            color:white;
            text-align:center;
            padding:20px;
            font-size:24px;
            font-weight:bold;
            border-radius:6px;
        }
    </style>
</head>

<body>

<div class="container">

    <header>
        My Header
    </header>

    <div class="boxes">
        <div class="box box1">Box 1</div>
        <div class="box box2">Box 2</div>
        <div class="box box3">Box 3</div>
    </div>

    <footer>
        My Footer
    </footer>

</div>

</body>
</html>
